<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>标题格式化工具</title>
    <style>
      :root {
        --bg-1: #f7fbff;
        --bg-2: #eef7f2;
        --panel: #ffffff;
        --ink: #1d2733;
        --muted: #5a6a7d;
        --line: #d7e0e8;
        --brand: #0f7b6c;
        --brand-strong: #0c5f54;
        --shadow: 0 14px 36px -24px rgba(26, 44, 59, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        font-family:
          "Avenir Next",
          "Noto Sans SC",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
        background:
          radial-gradient(circle at 8% 8%, #e6f5ff 0%, transparent 30%),
          radial-gradient(circle at 92% 92%, #e4f6ea 0%, transparent 28%),
          linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .page {
        width: min(1100px, 94vw);
        margin: 24px auto;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .title {
        margin: 0;
        font-size: clamp(1.35rem, 2.6vw, 2rem);
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.93rem;
      }

      .main-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: #fff;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      textarea {
        width: 100%;
        min-height: 270px;
        resize: vertical;
        border: 1px solid #c8d3dd;
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
        line-height: 1.45;
      }

      textarea:focus {
        outline: none;
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(15, 123, 108, 0.12);
      }

      #outputText {
        background: #f9fbfc;
      }

      .toolbar {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .btn {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 8px 12px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--brand);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--brand-strong);
      }

      .btn-ghost {
        background: #fff;
        border-color: #c8d3dd;
        color: var(--ink);
      }

      .switch {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 0.9rem;
        user-select: none;
      }

      .meta {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .status.ok {
        color: #0f7b6c;
      }

      .status.error {
        color: #b42318;
      }

      @media (max-width: 900px) {
        .main-grid {
          grid-template-columns: 1fr;
        }

        .switch {
          margin-left: 0;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <a href="index.html" style="position: absolute; top: 10px; right: 10px;"><button class="btn btn-primary">前往订单发票页</button></a>
    <main class="page">
      <section class="card">
        <h1 class="title">标题格式化工具</h1>
        <p class="subtitle">
          用于把商品标题统一为可读格式。支持排除词、品牌写法、常见缩写，保留原始换行与标点结构。
        </p>

        <div class="main-grid">
          <article class="panel">
            <h2>输入文本</h2>
            <textarea
              id="inputText"
              placeholder="粘贴原始标题或文本，支持多行。按 Ctrl/Cmd + Enter 可快速执行。"
            ></textarea>
          </article>

          <article class="panel">
            <h2>输出结果</h2>
            <textarea id="outputText" readonly placeholder="转换后结果会显示在这里。"></textarea>
          </article>
        </div>

        <div class="toolbar">
          <button class="btn btn-primary" id="transformBtn" type="button">执行转换</button>
          <button class="btn btn-ghost" id="copyBtn" type="button">复制结果</button>
          <button class="btn btn-ghost" id="sampleBtn" type="button">填充示例</button>
          <button class="btn btn-ghost" id="clearBtn" type="button">清空</button>
          <button class="btn btn-ghost" id="openTranslateBtn" type="button">新标签打开翻译</button>
          <label class="switch">
            <input id="autoRun" type="checkbox" checked />
            实时转换
          </label>
        </div>

        <div class="meta">
          <span id="counter">字符数: 0</span>
          <span class="status" id="statusText">等待输入</span>
        </div>
      </section>
    </main>

    <script>
      "use strict";

      const GOOGLE_TRANSLATE_BASE = "https://translate.google.com/?hl=zh-CN&sl=auto&tl=zh-CN&op=translate";

      const SMALL_WORDS = new Set([
        "a",
        "ad",
        "and",
        "aus",
        "avec",
        "cm",
        "con",
        "da",
        "de",
        "del",
        "des",
        "di",
        "do",
        "du",
        "e",
        "el",
        "en",
        "et",
        "for",
        "fur",
        "für",
        "i",
        "in",
        "la",
        "las",
        "le",
        "les",
        "los",
        "m",
        "med",
        "mit",
        "mm",
        "non",
        "och",
        "of",
        "on",
        "para",
        "per",
        "pour",
        "se",
        "und",
        "una",
        "usw",
        "ve",
        "vi",
        "von",
        "with",
        "x",
        "y",
        "zum",
        "à",
        "è",
      ]);

      const FORCE_UPPER_WORDS = new Set([
        "ai",
        "cpu",
        "diy",
        "fhd",
        "gb",
        "gps",
        "gpu",
        "hd",
        "hdmi",
        "hdr",
        "ips",
        "kb",
        "lcd",
        "led",
        "mb",
        "mp",
        "nfc",
        "oled",
        "pc",
        "pcie",
        "qhd",
        "qled",
        "ram",
        "rgb",
        "rom",
        "sd",
        "ssd",
        "tb",
        "tf",
        "uhd",
        "usb",
        "xdr",
      ]);

      const EXACT_CASE_WORDS = new Map([
        ["airplay", "AirPlay"],
        ["airpods", "AirPods"],
        ["airtag", "AirTag"],
        ["apple", "Apple"],
        ["earpods", "EarPods"],
        ["esim", "eSIM"],
        ["facetime", "FaceTime"],
        ["homepod", "HomePod"],
        ["imac", "iMac"],
        ["ios", "iOS"],
        ["ipad", "iPad"],
        ["ipados", "iPadOS"],
        ["iphone", "iPhone"],
        ["ipod", "iPod"],
        ["macbook", "MacBook"],
        ["macos", "macOS"],
        ["magsafe", "MagSafe"],
        ["mah", "mAh"],
        ["qi", "Qi"],
        ["qi2", "Qi2"],
        ["wifi", "Wi-Fi"],
        ["watchos", "watchOS"],
        ["xbox", "Xbox"],
      ]);
      const TOKEN_REGEX = /[A-Za-zÀ-ÖØ-öø-ÿ0-9]+/g;
      const TOKEN_BOUNDARY_CLASS = "A-Za-zÀ-ÖØ-öø-ÿ0-9";
      const queryParams = new URLSearchParams(window.location.search);
      const brandParam = String(queryParams.get("Brand") || "").trim();
      const otherParamValues = Array.from(
        new Set(
          String(queryParams.get("other") || "")
            .split(",")
            .map((item) => item.trim())
            .filter(Boolean),
        ),
      );
      const protectedTerms = [
        ...(brandParam ? [{ match: brandParam, replacement: brandParam }] : []),
        ...otherParamValues.map((item) => ({
          match: item,
          replacement: item.toUpperCase(),
        })),
      ];

      const inputTextEl = document.getElementById("inputText");
      const outputTextEl = document.getElementById("outputText");
      const statusTextEl = document.getElementById("statusText");
      const counterEl = document.getElementById("counter");
      const autoRunEl = document.getElementById("autoRun");
      const transformBtnEl = document.getElementById("transformBtn");
      const copyBtnEl = document.getElementById("copyBtn");
      const sampleBtnEl = document.getElementById("sampleBtn");
      const clearBtnEl = document.getElementById("clearBtn");
      const openTranslateBtnEl = document.getElementById("openTranslateBtn");

      function setStatus(message, type) {
        statusTextEl.textContent = message;
        statusTextEl.className = `status ${type || ""}`.trim();
      }

      function normalizeInput(text) {
        return String(text || "")
          .replace(/\u3000/g, " ")
          .replace(/，/g, ",")
          .replace(/。/g, ".")
          .replace(/；/g, ";")
          .replace(/：/g, ":")
          .replace(/（/g, "(")
          .replace(/）/g, ")");
      }

      function escapeRegex(value) {
        return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function protectConfiguredTerms(text) {
        if (!protectedTerms.length) {
          return {
            text,
            replacements: new Map(),
          };
        }

        let protectedText = text;
        const replacements = new Map();

        protectedTerms.forEach((term, index) => {
          const token = String.fromCodePoint(0xe000 + index);
          const pattern = new RegExp(
            `(^|[^${TOKEN_BOUNDARY_CLASS}])(${escapeRegex(term.match)})(?=$|[^${TOKEN_BOUNDARY_CLASS}])`,
            "gi",
          );

          protectedText = protectedText.replace(pattern, (_match, prefix) => `${prefix}${token}`);
          replacements.set(token, term.replacement);
        });

        return {
          text: protectedText,
          replacements,
        };
      }

      function restoreConfiguredTerms(text, replacements) {
        let restoredText = text;

        replacements.forEach((replacement, token) => {
          restoredText = restoredText.split(token).join(replacement);
        });

        return restoredText;
      }

      function isStrongBoundary(text, index) {
        for (let i = index - 1; i >= 0; i -= 1) {
          const char = text[i];
          if (/\s/.test(char)) continue;
          return /[\n.!?:;([/]/.test(char);
        }
        return true;
      }

      function transformWord(rawWord, index, sourceText) {
        const lowerWord = rawWord.toLowerCase();
        const shouldCapitalizeSmallWord = isStrongBoundary(sourceText, index);

        if (EXACT_CASE_WORDS.has(lowerWord)) {
          return EXACT_CASE_WORDS.get(lowerWord);
        }

        if (FORCE_UPPER_WORDS.has(lowerWord)) {
          return lowerWord.toUpperCase();
        }

        if (/^[a-z]\d+[a-z0-9]*$/.test(lowerWord)) {
          return lowerWord[0].toUpperCase() + lowerWord.slice(1);
        }

        if (SMALL_WORDS.has(lowerWord) && !shouldCapitalizeSmallWord) {
          return lowerWord;
        }

        if (/^\d+$/.test(lowerWord) || !lowerWord.length) {
          return lowerWord;
        }

        return lowerWord[0].toUpperCase() + lowerWord.slice(1);
      }

      function transformText(text) {
        const normalized = normalizeInput(text);
        const { text: protectedText, replacements } = protectConfiguredTerms(normalized);
        const transformed = protectedText.toLowerCase().replace(TOKEN_REGEX, (rawWord, index, sourceText) =>
          transformWord(rawWord, index, sourceText),
        );
        return restoreConfiguredTerms(transformed, replacements);
      }

      function refreshMeta() {
        const length = outputTextEl.value.length;
        counterEl.textContent = `字符数: ${length}`;
      }

      function runTransform() {
        outputTextEl.value = transformText(inputTextEl.value);
        refreshMeta();
        setStatus("转换完成", "ok");
      }

      function buildTranslateUrl(text) {
        const translateUrl = new URL(GOOGLE_TRANSLATE_BASE);
        if (text && text.trim()) {
          translateUrl.searchParams.set("text", text);
        }
        return translateUrl.toString();
      }

      function getTextForTranslate() {
        return outputTextEl.value || transformText(inputTextEl.value);
      }

      function openTranslateInNewTab() {
        const text = getTextForTranslate();
        window.open(buildTranslateUrl(text), "_blank", "noopener,noreferrer");
        setStatus("已在新标签打开翻译", "ok");
      }

      async function copyResult() {
        const text = outputTextEl.value;
        if (!text) {
          setStatus("没有可复制内容", "error");
          return;
        }

        try {
          await navigator.clipboard.writeText(text);
          setStatus("已复制到剪贴板", "ok");
        } catch (_error) {
          outputTextEl.select();
          document.execCommand("copy");
          window.getSelection().removeAllRanges();
          setStatus("已复制到剪贴板", "ok");
        }
      }

      function fillSample() {
        inputTextEl.value =
          "iphone 16e 128 gb: entwickelt für apple intelligence, a18 chip, gigantische batterielaufzeit, 48 mp fusion kamera, usb-c, wifi 6, 6,1'' super retina xdr display, schwarz";
        runTransform();
      }

      function clearAll() {
        inputTextEl.value = "";
        outputTextEl.value = "";
        refreshMeta();
        setStatus("已清空", "");
        inputTextEl.focus();
      }

      inputTextEl.addEventListener("input", () => {
        if (autoRunEl.checked) runTransform();
      });

      inputTextEl.addEventListener("keydown", (event) => {
        const isShortcut = (event.ctrlKey || event.metaKey) && event.key === "Enter";
        if (isShortcut) {
          event.preventDefault();
          runTransform();
        }
      });

      transformBtnEl.addEventListener("click", runTransform);
      copyBtnEl.addEventListener("click", copyResult);
      sampleBtnEl.addEventListener("click", fillSample);
      clearBtnEl.addEventListener("click", clearAll);
      openTranslateBtnEl.addEventListener("click", openTranslateInNewTab);
      refreshMeta();
    </script>
  </body>
</html>
